<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 SALVO QUIZ PRO</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

<style>
body{
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#6c2bd9,#9333ea);
margin:0;
padding:20px;
}

.quiz{
max-width:800px;
margin:auto;
background:white;
border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.3);
overflow:hidden;
}

.header{
background: linear-gradient(135deg,#7c3aed,#a855f7);
color:white;
padding:20px;
text-align:center;
}

.progress{
font-size:14px;
opacity:0.9;
}

.content{
padding:25px;
}

.option{
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #ddd;
cursor:pointer;
transition:0.2s;
}

.option:hover{
transform:scale(1.02);
background:#f5f3ff;
}

.correct{background:#dcfce7;}
.wrong{background:#fee2e2;}

.explanation{
margin-top:15px;
padding:12px;
background:#fff7ed;
border-left:5px solid orange;
border-radius:10px;
}

.nav{
display:flex;
justify-content:space-between;
padding:15px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
cursor:pointer;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
padding:12px 20px;
border-radius:10px;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<div class="quiz">
<div class="header">
<h2>🔥 SALVO QUIZ PRO</h2>
<div class="progress" id="progress"></div>
</div>

<div class="content">
<h3 id="question"></h3>
<div id="options"></div>
<div id="explanation"></div>
</div>

<div class="nav">
<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>
</div>
</div>

<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c8f3a0d4e.mp3"></audio>

<script>

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

const questions=[

{q:"___ you had lunch?",o:["Have","Has","Did","Do"],a:0,e:"Present perfect → Have you had"},
{q:"What ___ we have to do?",o:["do","does","did","are"],a:0,e:"We → do"},
{q:"What ___ you happy in the morning?",o:["makes","make","made","making"],a:0,e:"Singular → makes"},
{q:"How many books ___ Erny buy?",o:["did","does","do","is"],a:0,e:"Past → did"},
{q:"Is this book ___ by you?",o:["written","wrote","write","writing"],a:0,e:"Passive → written"},
{q:"Your father often ___ to the office at 6 AM",o:["go","goes","went","going"],a:1,e:"He → goes"},
{q:"___ you so sad last night?",o:["Why were","Why are","Why do","Why did"],a:0,e:"Past → were"},
{q:"Where ___ her friend studying right now?",o:["is","are","does","did"],a:0,e:"Present continuous"},
{q:"Where has that thief ___ money?",o:["hidden","hide","hides","hiding"],a:0,e:"Present perfect → hidden"},
{q:"Where ___ Mr Rizky and Mr Imdar teaching English?",o:["are","is","do","did"],a:0,e:"Plural → are"},
{q:"Where have those employees been ___ for two hours?",o:["working","work","worked","works"],a:0,e:"Have been → working"},
{q:"Where ___ Riri always go on Saturday?",o:["does","do","did","is"],a:0,e:"Riri → does"},
{q:"Where ___ your cousin ___ English so fast?",o:["does-learn","do-learn","did-learn","is-learning"],a:0,e:"Present simple"},
{q:"Where are you ___?",o:["going","go","went","goes"],a:0,e:"Are → going"},
{q:"___ your friends usually hang out?",o:["Where do","Where does","Where did","Where are"],a:0,e:"Plural → do"},
{q:"Where ___ your brother eaten pizza?",o:["has","have","did","is"],a:0,e:"Has eaten"},
{q:"___ always given money by your father?",o:["Who is","Who are","Who did","Who does"],a:0,e:"Passive → who is"},
{q:"What ___ you usually do before sleeping?",o:["do","does","did","are"],a:0,e:"You → do"},
{q:"___ always feel sad with him?",o:["Who","What","Where","When"],a:0,e:"Subject → who"},
{q:"___ always accompanies you?",o:["Who","What","Where","When"],a:0,e:"Subject → who"}

];

let current=0;
let answers=new Array(questions.length).fill(null);

function toast(msg,color){
document.querySelectorAll(".toast").forEach(t=>t.remove());
let t=document.createElement("div");
t.className="toast";
t.style.background=color;
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

function render(){
let q=questions[current];
document.getElementById("question").innerText=q.q;
document.getElementById("progress").innerText=`Soal ${current+1} / ${questions.length}`;

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((opt,i)=>{
let div=document.createElement("div");
div.className="option";

if(answers[current]!=null){
if(i==q.a) div.classList.add("correct");
if(i==answers[current] && i!=q.a) div.classList.add("wrong");
}

div.innerText=opt.replace("-", " ");

div.onclick=()=>{
if(answers[current]!=null) return;

answers[current]=i;

if(i==q.a){
confetti({particleCount:80,spread:60});
correctSound.currentTime=0;
correctSound.play();
toast("✅ BENAR","green");
}else{
wrongSound.currentTime=0;
wrongSound.play();
toast("❌ SALAH","red");
}

render();
};

box.appendChild(div);
});

let exp=document.getElementById("explanation");

if(answers[current]!=null){
exp.innerHTML="<b>Penjelasan:</b> "+q.e;
}else{
exp.innerHTML="";
}
}

function next(){if(current<questions.length-1){current++;render();}}
function prev(){if(current>0){current--;render();}}

render();

</script>

</body>
</html>
