<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Salvo Group | Grammar Basic Part 3</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f8f9ff 0%, #f0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .quiz-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2), 0 2px 10px rgba(0,0,0,0.02);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .hero {
            background: linear-gradient(135deg, #FFFFFF 0%, #F3E8FF 100%);
            padding: 1.8rem 2rem;
            border-bottom: 1px solid rgba(128, 90, 213, 0.2);
        }

        .hero h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(120deg, #5E3A9C, #9B6BFF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .hero h1 i {
            background: none;
            color: #8B5CF6;
            font-size: 2rem;
        }

        .sub {
            color: #4a3b6e;
            font-weight: 500;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .score-panel {
            background: white;
            margin: 0 1.8rem 1rem 1.8rem;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 6px 14px rgba(106, 46, 176, 0.08);
            border: 1px solid rgba(156, 107, 255, 0.3);
        }

        .score-box {
            background: #f1ebff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 700;
            color: #5a2d9c;
        }

        .score-box span {
            font-size: 1.3rem;
            font-weight: 800;
            color: #6c2bd9;
        }

        .progress-indicator {
            font-weight: 500;
            background: #ede8ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            color: #4f359b;
        }

        .quiz-card {
            padding: 1.8rem 2rem 2rem 2rem;
        }

        .question-text {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1E1A3E;
            margin-bottom: 2rem;
            line-height: 1.3;
            background: #F9F6FF;
            padding: 1rem 1.5rem;
            border-radius: 2rem;
            border-left: 8px solid #9B6BFF;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option-btn {
            background: white;
            border: 1.5px solid #E2D6FF;
            border-radius: 1.2rem;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #2d2a4a;
        }

        .option-btn:hover:not(:disabled) {
            background: #F5EFFF;
            border-color: #9B6BFF;
            transform: translateX(6px);
        }

        .prefix {
            font-weight: 800;
            background: #ede4ff;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #6c2bd9;
        }

        .feedback-area {
            background: #F8F4FF;
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin: 1rem 0 1.5rem;
            border-left: 6px solid #9B6BFF;
            transition: all 0.2s;
        }

        .feedback-correct {
            background: #E6F9ED;
            border-left-color: #2b9348;
        }

        .feedback-wrong {
            background: #FFEFEF;
            border-left-color: #e63946;
        }

        .feedback-neutral {
            background: #F4F0FE;
            border-left-color: #bdc3e0;
        }

        .feedback-text {
            font-weight: 500;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            gap: 1rem;
        }

        .nav-btn {
            background: white;
            border: none;
            padding: 0.8rem 1.6rem;
            border-radius: 2rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
        }

        .nav-btn-primary {
            background: linear-gradient(95deg, #7C3AED, #A78BFA);
            color: white;
            border: none;
            box-shadow: 0 6px 14px rgba(124, 58, 237, 0.3);
        }

        .nav-btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-area {
            background: white;
            border-radius: 2rem;
            margin: 1rem 1.8rem 1.8rem 1.8rem;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-top: 2px solid #cbbaff;
        }

        .weakness-tag {
            background: #ede8ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin: 0.2rem;
        }

        .chart-container {
            max-width: 220px;
            margin: 0 auto;
        }

        @media (max-width: 680px) {
            .quiz-card {
                padding: 1rem;
            }
            .question-text {
                font-size: 1.3rem;
            }
            .hero h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quizApp">
    <div class="hero">
        <h1><i class="fas fa-gem"></i> SALVO GROUP <br style="display: none;"> GRAMMAR BASIC PART 1</h1>
        <div class="sub">✨ Master your English grammar — instant feedback & smart scoring</div>
    </div>

    <div class="score-panel">
        <div class="score-box"><i class="fas fa-star-of-life"></i> SCORE : <span id="scoreValue">0</span> / <span id="totalQuestions">0</span></div>
        <div class="progress-indicator"><i class="fas fa-question-circle"></i> Soal <span id="currentIdxDisplay">1</span> dari <span id="totalDisplay">0</span></div>
    </div>

    <div class="quiz-card" id="quizCard">
        <div class="question-text" id="questionText">Loading...</div>
        <div class="options-grid" id="optionsContainer"></div>
        <div id="feedbackArea" class="feedback-area feedback-neutral">
            <div class="feedback-text"><i class="fas fa-lightbulb"></i> Pilih salah satu jawaban untuk melihat pembahasan & kunci.</div>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> Sebelumnya</button>
            <button class="nav-btn nav-btn-primary" id="nextBtn" disabled><i class="fas fa-arrow-right"></i> Selanjutnya</button>
        </div>
    </div>

    <div id="resultArea" class="result-area" style="display: none;">
        <!-- hasil akhir dengan chart dan kelemahan -->
    </div>
</div>

<script>
    // ==================== SOAL BARU (20 SOAL) ====================
    const questionsData = [
        { q: "_____ you had lunch ?", o: ["Did", "Do", "Have", "Are"], correct: 2, explanation: "Present Perfect tense: 'Have you had lunch?' untuk menanyakan pengalaman/kejadian yang baru saja terjadi." },
        { q: "What ___ we have to do ?", o: ["Must", "Have", "Do", "Does"], correct: 2, explanation: "Auxiliary 'do' digunakan untuk membuat pertanyaan dengan subject 'we' dalam simple present." },
        { q: "What _______ you happy in the morning ?", o: ["Make", "Making", "Makes", "Are making"], correct: 2, explanation: "Subject 'What' dianggap singular (third person), maka verb + s → 'makes'." },
        { q: "How many books _________ Erny buy ?", o: ["Do", "Does", "Are", "Have"], correct: 1, explanation: "Subject 'Erny' (she) dalam simple present question menggunakan auxiliary 'does'." },
        { q: "Is this book __________ by you ?", o: ["Write", "Writes", "Written", "Writing"], correct: 2, explanation: "Passive voice: 'is + past participle (written)' → buku ditulis oleh kamu." },
        { q: "Your father often ________ to the office at 6 Am.", o: ["Go", "Goes", "Went", "Going"], correct: 1, explanation: "Subject 'Your father' (he) + often (habit) → menggunakan 'goes'." },
        { q: "___________________ so sad last night ?", o: ["Why are you", "Why you were", "Why were you", "Why you are"], correct: 2, explanation: "Pertanyaan past tense: 'Why were you' untuk subject 'you' + last night." },
        { q: "Where _____ her friend studying right now ?", o: ["Is", "Are", "Has", "Have"], correct: 0, explanation: "Present continuous: 'is studying' untuk subject singular 'her friend'." },
        { q: "Where has that thief _________ money ?", o: ["Steal", "Stole", "Stealed", "Stolen"], correct: 3, explanation: "Present perfect: 'has + past participle (stolen)' → mencuri." },
        { q: "Where _______ Mr Rizky and Mr Imdar teaching English ?", o: ["Is", "Are", "Do", "Does"], correct: 1, explanation: "Subject 'Mr Rizky and Mr Imdar' (plural) → menggunakan 'are'." },
        { q: "Where have those employees been _____ for two hours ?", o: ["Swim", "Swam", "Swum", "Swimming"], correct: 3, explanation: "Present perfect continuous: 'have been + verb-ing (swimming)'." },
        { q: "Where _______ Riri always go on saturday ?", o: ["Do", "Does", "Has", "Am"], correct: 1, explanation: "Subject 'Riri' (she) + always + simple present → menggunakan 'does'." },
        { q: "Where ________ your cousin __________ English so fast by practicing it ?", o: ["Have, learned", "Has, learned", "Have, been learning", "Has, been learning"], correct: 3, explanation: "Present perfect continuous: 'has been learning' untuk subject singular 'your cousin'." },
        { q: "Where are you ________ ?", o: ["Go", "Gone", "Going", "Goes"], correct: 2, explanation: "Present continuous: 'are + going' untuk menanyakan aktivitas yang sedang dilakukan." },
        { q: "______________ your friends usually hang out ?", o: ["Where do", "Where does", "Where are", "Where Did"], correct: 0, explanation: "Subject 'your friends' (plural) + usually + simple present → 'Where do'." },
        { q: "Where ____________ brother eaten Pizza ?", o: ["Has, Yours", "Has, Your", "Have, Yours", "Have, Your"], correct: 1, explanation: "Present perfect: 'has' untuk subject singular 'brother', dan 'your' sebagai possessive adjective." },
        { q: "______________ always given money by your father ?", o: ["Are you", "Do you", "Have you", "Did you"], correct: 0, explanation: "Passive voice present: 'are you given' → Apakah kamu selalu diberi uang." },
        { q: "What ________ you usually do before sleeping ?", o: ["Do", "Are", "Did", "Were"], correct: 0, explanation: "Simple present question: 'do' untuk subject 'you' + usually." },
        { q: "_____________ always feel sad with him ?", o: ["Aren't you", "Don't you", "Haven't you", "Didn't you"], correct: 1, explanation: "Simple present negatif question: 'Don't you feel sad?' untuk menanyakan kebiasaan/perasaan." },
        { q: "_____________ always accompanies you ?", o: ["Who", "Who does", "Who did", "Who was"], correct: 0, explanation: "Pertanyaan tentang subject: 'Who accompanies you?' tanpa auxiliary karena 'who' sebagai subject." }
    ];

    // state aplikasi
    let currentIndex = 0;
    let userAnswers = new Array(questionsData.length).fill(null);
    let answerStatus = new Array(questionsData.length).fill(false);
    let answeredQuestions = new Array(questionsData.length).fill(false);
    let score = 0;
    
    const totalQ = questionsData.length;
    document.getElementById("totalQuestions").innerText = totalQ;
    document.getElementById("totalDisplay").innerText = totalQ;
    
    // Elemen DOM
    const questionTextEl = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const feedbackArea = document.getElementById("feedbackArea");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const scoreSpan = document.getElementById("scoreValue");
    const currentIdxDisplaySpan = document.getElementById("currentIdxDisplay");
    const resultAreaDiv = document.getElementById("resultArea");
    const quizCardDiv = document.getElementById("quizCard");
    
    // fungsi hitung ulang score
    function recalcScore() {
        let newScore = 0;
        for (let i = 0; i < totalQ; i++) {
            if (answerStatus[i] === true) newScore++;
        }
        score = newScore;
        scoreSpan.innerText = score;
    }
    
    // update tombol navigasi
    function updateNavButtons() {
        prevBtn.disabled = (currentIndex === 0);
        if (currentIndex === totalQ - 1) {
            nextBtn.innerHTML = '<i class="fas fa-check-circle"></i> Lihat Hasil';
        } else {
            nextBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Selanjutnya';
        }
        
        if (!answeredQuestions[currentIndex]) {
            nextBtn.disabled = true;
        } else {
            nextBtn.disabled = false;
        }
    }
    
    // render feedback
    function renderFeedbackForCurrent() {
        const idx = currentIndex;
        const selected = userAnswers[idx];
        const isAnswered = answeredQuestions[idx];
        const isCorrect = answerStatus[idx];
        const question = questionsData[idx];
        
        if (!isAnswered || selected === null) {
            feedbackArea.className = "feedback-area feedback-neutral";
            feedbackArea.innerHTML = `<div class="feedback-text"><i class="fas fa-lightbulb"></i> Pilih salah satu jawaban untuk melihat pembahasan & kunci.</div>`;
            return;
        }
        
        const selectedText = question.o[selected];
        const correctText = question.o[question.correct];
        const explanation = question.explanation;
        
        if (isCorrect) {
            feedbackArea.className = "feedback-area feedback-correct";
            feedbackArea.innerHTML = `
                <div class="feedback-text">
                    <i class="fas fa-check-circle" style="color:#2b9348; font-size:1.2rem;"></i>
                    <strong>✅ Jawaban Benar!</strong> &nbsp; Pilihanmu: "${selectedText}" 
                </div>
                <div style="margin-top: 8px; font-size:0.9rem;">📘 <strong>Kunci & Pembahasan:</strong> ${explanation} (Jawaban benar: <strong>${correctText}</strong>)</div>
            `;
        } else {
            feedbackArea.className = "feedback-area feedback-wrong";
            feedbackArea.innerHTML = `
                <div class="feedback-text">
                    <i class="fas fa-times-circle" style="color:#e63946; font-size:1.2rem;"></i>
                    <strong>❌ Jawaban Salah</strong> &nbsp; Kamu menjawab: "${selectedText}"
                </div>
                <div style="margin-top: 8px; font-size:0.9rem;">📘 <strong>Kunci & Pembahasan:</strong> ${explanation} (Jawaban benar: <strong>${correctText}</strong>)</div>
            `;
        }
    }
    
    // render soal
    function renderCurrentQuestion() {
        const qData = questionsData[currentIndex];
        questionTextEl.innerText = qData.q;
        const selectedIdx = userAnswers[currentIndex];
        const isAnsweredLocal = answeredQuestions[currentIndex];
        
        let optionsHtml = '';
        const letters = ['A', 'B', 'C', 'D'];
        qData.o.forEach((opt, idx) => {
            let additionalClass = '';
            if (isAnsweredLocal && selectedIdx === idx) {
                additionalClass = 'style="background: #E9DFFF; border-color: #9B6BFF; box-shadow: 0 2px 8px rgba(155,107,255,0.2);"';
            }
            optionsHtml += `
                <div class="option-btn" data-opt-index="${idx}" ${additionalClass}>
                    <span class="prefix">${letters[idx]}</span>
                    <span style="flex:1;">${opt}</span>
                </div>
            `;
        });
        optionsContainer.innerHTML = optionsHtml;
        
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const optIndex = parseInt(btn.dataset.optIndex);
                handleAnswer(optIndex);
            });
        });
        
        renderFeedbackForCurrent();
        updateNavButtons();
        document.getElementById("currentIdxDisplay").innerText = currentIndex + 1;
    }
    
    // handle jawaban
    function handleAnswer(selectedIndex) {
        const currentQ = questionsData[currentIndex];
        const isCorrectNow = (selectedIndex === currentQ.correct);
        const wasAlreadyAnswered = answeredQuestions[currentIndex];
        
        userAnswers[currentIndex] = selectedIndex;
        answeredQuestions[currentIndex] = true;
        const oldStatus = answerStatus[currentIndex];
        answerStatus[currentIndex] = isCorrectNow;
        
        if (oldStatus !== isCorrectNow) {
            recalcScore();
        } else if (!wasAlreadyAnswered && isCorrectNow) {
            recalcScore();
        } else if (!wasAlreadyAnswered && !isCorrectNow) {
            recalcScore();
        } else if (wasAlreadyAnswered && oldStatus !== isCorrectNow) {
            recalcScore();
        } else {
            recalcScore();
        }
        
        renderCurrentQuestion();
        updateNavButtons();
    }
    
    // navigasi
    function goNext() {
        if (currentIndex < totalQ - 1) {
            currentIndex++;
            renderCurrentQuestion();
            updateNavButtons();
        } else {
            if (answeredQuestions.every(v => v === true)) {
                showFinalResult();
            } else {
                alert(`⚠️ Anda belum menjawab semua soal! Selesaikan dulu ${totalQ - answeredQuestions.filter(v=>v===true).length} soal tersisa.`);
                return;
            }
        }
    }
    
    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
            updateNavButtons();
        }
    }
    
    // analisis kelemahan
    function analyzeWeakness() {
        let categories = {
            "Present Perfect (have/has)": [],
            "Simple Present (do/does)": [],
            "Past Tense (did/was/were)": [],
            "Present Continuous (is/are/am + ing)": [],
            "Passive Voice": [],
            "Question Words (Who/What/Where)": [],
            "Present Perfect Continuous": []
        };
        
        for (let i = 0; i < totalQ; i++) {
            const isCorrect = answerStatus[i];
            const qText = questionsData[i].q;
            let category = "";
            
            if (qText.includes("have you had") || qText.includes("has that thief") || qText.includes("have those employees") || qText.includes("brother eaten")) category = "Present Perfect (have/has)";
            else if (qText.includes("do") && (qText.includes("usually") || qText.includes("always") || qText.includes("often"))) category = "Simple Present (do/does)";
            else if (qText.includes("last night") || qText.includes("yesterday")) category = "Past Tense (did/was/were)";
            else if (qText.includes("studying") || qText.includes("teaching") || qText.includes("going")) category = "Present Continuous (is/are/am + ing)";
            else if (qText.includes("by you") || qText.includes("by your father")) category = "Passive Voice";
            else if (qText.includes("Where") || qText.includes("What") || qText.includes("Who")) category = "Question Words (Who/What/Where)";
            else if (qText.includes("been learning") || qText.includes("been swimming")) category = "Present Perfect Continuous";
            else category = "Grammar Fundamentals";
            
            if (!isCorrect) {
                if (!categories[category]) categories[category] = [];
                categories[category].push(i+1);
            }
        }
        
        let weaknesses = [];
        for (let [cat, arr] of Object.entries(categories)) {
            if (arr && arr.length > 0) {
                weaknesses.push({ cat, count: arr.length, soal: arr });
            }
        }
        return weaknesses;
    }
    
    function showFinalResult() {
        quizCardDiv.style.display = "none";
        document.querySelector(".score-panel").style.display = "none";
        resultAreaDiv.style.display = "block";
        
        const percentage = (score / totalQ) * 100;
        let gradeText = "";
        if (percentage >= 85) gradeText = "🏆 Excellent! Grammar pro!";
        else if (percentage >= 70) gradeText = "🎉 Good job, tingkatkan lagi!";
        else if (percentage >= 50) gradeText = "📚 Perlu belajar lebih giat, fokus pada pembahasan.";
        else gradeText = "⚠️ Masih banyak kelemahan, pelajari ulang materi dasar.";
        
        const weaknesses = analyzeWeakness();
        let weakHtml = `<div style="margin-top: 16px;"><strong><i class="fas fa-chart-line"></i> Analisis Kelemahan:</strong><br/>`;
        if (weaknesses.length === 0) {
            weakHtml += `<span class="weakness-tag"><i class="fas fa-check-circle"></i> Hebat! Tidak ada kelemahan signifikan!</span>`;
        } else {
            weakHtml += `<div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;">`;
            weaknesses.forEach(w => {
                weakHtml += `<span class="weakness-tag"><i class="fas fa-exclamation-triangle"></i> ${w.cat} (salah di ${w.soal.length} soal: nomor ${w.soal.join(", ")})</span>`;
            });
            weakHtml += `</div><p style="margin-top: 12px; font-size: 0.85rem;">✨ Fokus ulang pada materi di atas untuk meningkatkan skor!</p>`;
        }
        
        resultAreaDiv.innerHTML = `
            <div style="text-align: center;">
                <i class="fas fa-chalkboard-user" style="font-size: 3rem; color:#8B5CF6;"></i>
                <h2 style="margin: 10px 0 5px;">Hasil Evaluasi Grammar</h2>
                <div style="font-size: 2.5rem; font-weight: 800; background: linear-gradient(145deg,#7C3AED,#A78BFA); -webkit-background-clip:text; background-clip:text; color:transparent;">${score}/${totalQ}</div>
                <div style="background:#ede8ff; display:inline-block; padding:5px 18px; border-radius:40px; margin-top:8px;">${gradeText}</div>
                <div style="margin: 20px auto; max-width: 200px;">
                    <canvas id="scoreChart" width="200" height="200"></canvas>
                </div>
                ${weakHtml}
                <button id="restartQuizBtn" class="nav-btn nav-btn-primary" style="margin-top: 25px; background: #5a2d9c;"><i class="fas fa-sync-alt"></i> Ulangi Kuis</button>
            </div>
        `;
        
        const ctx = document.getElementById('scoreChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Benar', 'Salah'],
                datasets: [{
                    data: [score, totalQ - score],
                    backgroundColor: ['#9B6BFF', '#F0E6FF'],
                    borderWidth: 0,
                    cutout: '65%'
                }]
            },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
        });
        
        document.getElementById("restartQuizBtn").addEventListener("click", () => {
            userAnswers.fill(null);
            answerStatus.fill(false);
            answeredQuestions.fill(false);
            currentIndex = 0;
            score = 0;
            recalcScore();
            quizCardDiv.style.display = "block";
            document.querySelector(".score-panel").style.display = "flex";
            resultAreaDiv.style.display = "none";
            renderCurrentQuestion();
            updateNavButtons();
        });
    }
    
    prevBtn.addEventListener("click", goPrev);
    nextBtn.addEventListener("click", goNext);
    
    recalcScore();
    renderCurrentQuestion();
