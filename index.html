<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Grammar Quiz - SALVO GROUP</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

<style>
body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#6d28d9,#a855f7);
margin:0;
color:#fff;
}

.container{
max-width:900px;
margin:40px auto;
background:#fff;
color:#111;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.header{
background:linear-gradient(135deg,#7c3aed,#c084fc);
padding:25px;
text-align:center;
color:white;
}

.score-panel{
display:flex;
justify-content:space-between;
padding:15px;
background:#f3e8ff;
font-weight:bold;
}

.question{
padding:25px;
font-size:22px;
font-weight:600;
}

.option{
margin:10px 20px;
padding:15px;
border-radius:12px;
border:2px solid #ddd;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#f5edff;
transform:translateX(5px);
}

.correct{
background:#d1fae5;
border-color:#10b981;
}

.wrong{
background:#fee2e2;
border-color:#ef4444;
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

.explanation{
background:#fef9c3;
margin:15px 20px;
padding:15px;
border-left:5px solid orange;
border-radius:10px;
}

.nav{
display:flex;
justify-content:space-between;
padding:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:30px;
background:#7c3aed;
color:white;
cursor:pointer;
font-weight:bold;
}

button:disabled{
opacity:0.4;
}

.toast{
position:fixed;
top:20px;
right:20px;
padding:15px 25px;
border-radius:12px;
color:white;
font-weight:bold;
display:none;
z-index:999;
}

.toast.success{background:#10b981;}
.toast.error{background:#ef4444;}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>🎓 ADVANCED TOEFL QUIZ</h2>
<p>SALVO GROUP INTERACTIVE SYSTEM</p>
</div>

<div class="score-panel">
<div>Score: <span id="score">0</span></div>
<div>Question: <span id="number">1</span>/20</div>
</div>

<div id="quiz"></div>

<div class="nav">
<button id="prev">Previous</button>
<button id="next">Next</button>
</div>

</div>

<div id="toast" class="toast"></div>

<script>

// SOUND (FIX autoplay issue)
const correctSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const wrongSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

// FORCE LOAD
correctSound.load();
wrongSound.load();

const questions=[
{
text:"_____ you had lunch?",
options:["Have","Has","Did","Do"],
correct:0,
exp:"Present Perfect → HAVE + Verb 3. Subject YOU → HAVE."
},
{
text:"What ___ we have to do?",
options:["do","does","did","are"],
correct:0,
exp:"Simple Present question → WE gunakan DO."
},
{
text:"What ______ you happy in the morning?",
options:["makes","make","made","making"],
correct:0,
exp:"WHAT sebagai subject → singular → MAKES."
},
{
text:"How many books ______ Erny buy?",
options:["did","does","do","is"],
correct:0,
exp:"Past question → DID + verb1."
},
{
text:"Is this book __________ by you?",
options:["written","write","wrote","writing"],
correct:0,
exp:"Passive → Verb 3 → WRITTEN."
}
];

let current=0;
let answers=new Array(questions.length).fill(null);

function showToast(msg,type){
const t=document.getElementById("toast");
t.innerText=msg;
t.className="toast "+type;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

function confettiBoom(){
confetti({particleCount:150,spread:80,origin:{y:0.6}});
}

function render(){

const q=questions[current];

let html=`<div class="question">${q.text}</div>`;

q.options.forEach((opt,i)=>{

let cls="option";

if(answers[current]!==null){
if(i===q.correct) cls+=" correct";
if(i===answers[current] && i!==q.correct) cls+=" wrong";
}

html+=`<div class="${cls}" onclick="answer(${i})">${String.fromCharCode(65+i)}. ${opt}</div>`;
});

if(answers[current]!==null){
html+=`<div class="explanation">${q.exp}</div>`;
}

document.getElementById("quiz").innerHTML=html;

document.getElementById("number").innerText=current+1;

updateScore();
}

function answer(i){

if(answers[current]!==null) return;

answers[current]=i;

if(i===questions[current].correct){
confettiBoom();
correctSound.currentTime=0;
correctSound.play();
showToast("✅ BENAR!", "success");
}else{
wrongSound.currentTime=0;
wrongSound.play();
showToast("❌ SALAH!", "error");
}

render();
}

function updateScore(){
let score=answers.filter((a,i)=>a===questions[i].correct).length;
document.getElementById("score").innerText=score;
}

document.getElementById("next").onclick=()=>{
if(current<questions.length-1){
current++;
render();
}
};

document.getElementById("prev").onclick=()=>{
if(current>0){
current--;
render();
}
};

render();

</script>

</body>
</html>
