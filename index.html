    <style>

        .feedback-text {

<body>
<div class="quiz-container" id="quizApp">

<script>
    // ---------- SOAL BARU DENGAN PENJELASAN PANJANG & DETAIL ----------
    const questionsData = [
        { 
            q: "_____ you had lunch ?", 
            o: ["Did", "Do", "Have", "Are"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kalimat ini menanyakan apakah seseorang sudah makan siang atau belum. Kata 'had' adalah bentuk verb-3 (past participle) dari 'have'. Dalam bahasa Inggris, untuk menanyakan pengalaman atau kejadian yang baru saja terjadi tanpa menyebutkan waktu spesifik, kita menggunakan Present Perfect Tense.<br><br>📌 <strong>Rumus Present Perfect (Interrogative):</strong> Have/Has + Subject + Verb-3?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek 'you' menggunakan auxiliary 'have'. 'Have you had lunch?' berarti 'Apakah kamu sudah makan siang?'. Ini adalah bentuk yang tepat untuk menanyakan aktivitas yang baru saja selesai atau belum selesai hingga saat ini.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Did' digunakan untuk Simple Past (Did you have lunch? - menanyakan masa lalu spesifik). ❌ 'Do' untuk Simple Present. ❌ 'Are' untuk Present Continuous. ✅ 'Have' adalah jawaban yang paling tepat untuk konteks ini.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Have</strong> (Have you had lunch?)"
        },
        { 
            q: "What ___ we have to do ?", 
            o: ["Must", "Have", "Do", "Does"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kalimat ini menggunakan struktur 'have to' yang berarti 'harus'. Untuk membentuk kalimat tanya dengan 'have to', kita memerlukan auxiliary 'do' atau 'does' tergantung subjeknya.<br><br>📌 <strong>Rumus:</strong> What + do/does + subject + have to + verb?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek dalam kalimat ini adalah 'we' (kita). Subjek 'we' menggunakan auxiliary 'do'. Jadi bentuk yang benar adalah 'What do we have to do?' yang berarti 'Apa yang harus kita lakukan?'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Must' bisa berarti 'harus' tetapi tidak bisa digabung dengan 'have to' dalam struktur tanya seperti ini. ❌ 'Have' tidak tepat karena 'have to' sudah mengandung kata 'have', sehingga auxiliary yang diperlukan adalah 'do'. ✅ 'Do' adalah jawaban yang benar. ❌ 'Does' digunakan untuk subjek tunggal (he/she/it).<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Do</strong> (What do we have to do?)"
        },
        { 
            q: "What _______ you happy in the morning ?", 
            o: ["Make", "Making", "Makes", "Are making"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kalimat ini menanyakan tentang hal atau sesuatu yang membuat seseorang bahagia di pagi hari. Kata 'happy' di sini berfungsi sebagai adjective (kata sifat) yang dilengkapi oleh kata kerja 'make' yang berarti 'membuat/menyebabkan'.<br><br>📌 <strong>Struktur Kalimat:</strong> What + makes + you + happy? (Apa yang membuatmu bahagia?)<br><br>📌 <strong>Alasan Jawaban:</strong> Kata 'what' di sini berfungsi sebagai subjek tunggal (singular subject). Ketika 'what' menjadi subjek dalam kalimat Simple Present, kata kerja yang mengikutinya harus dalam bentuk verb-3 untuk subjek tunggal, yaitu 'makes'. Ini adalah aturan subject-verb agreement.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Make' digunakan untuk subjek jamak (I, you, we, they). ❌ 'Making' adalah bentuk verb-ing yang membutuhkan auxiliary 'is/am/are'. ❌ 'Are making' adalah bentuk Present Continuous yang tidak tepat karena pertanyaan ini menanyakan fakta umum, bukan aksi yang sedang berlangsung. ✅ 'Makes' adalah jawaban yang benar karena 'what' di sini adalah subjek tunggal.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Makes</strong> (What makes you happy in the morning?)"
        },
        { 
            q: "How many books _________ Erny buy ?", 
            o: ["Do", "Does", "Are", "Have"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kalimat ini menanyakan jumlah buku yang dibeli oleh Erny. Kata 'buy' adalah verb-1 (bentuk dasar). Untuk membentuk kalimat tanya Simple Present dengan subjek orang ketiga tunggal, kita menggunakan auxiliary 'does' diikuti verb-1.<br><br>📌 <strong>Rumus Simple Present (Interrogative):</strong> Question word + does + subject (he/she/it) + verb-1?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek 'Erny' adalah orang ketiga tunggal (she). Oleh karena itu, auxiliary yang digunakan adalah 'does'. Setelah 'does', kata kerja 'buy' tetap dalam bentuk verb-1 (tidak ditambah -s/-es).<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Do' digunakan untuk subjek I, you, we, they. ✅ 'Does' adalah jawaban yang benar untuk subjek tunggal Erny. ❌ 'Are' digunakan untuk kata sifat atau Present Continuous. ❌ 'Have' digunakan untuk Present Perfect.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Does</strong> (How many books does Erny buy?)"
        },
        { 
            q: "Is this book __________ by you ?", 
            o: ["Write", "Writes", "Written", "Writing"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kalimat ini adalah bentuk kalimat pasif (passive voice). Ciri-cirinya adalah adanya kata 'by' yang menunjukkan pelaku. Dalam passive voice, objek dari kalimat aktif menjadi subjek kalimat pasif.<br><br>📌 <strong>Rumus Passive Voice (Simple Present):</strong> Is/Am/Are + Subject + Verb-3 (past participle) + by + agent<br><br>📌 <strong>Alasan Jawaban:</strong> Kalimat 'Is this book written by you?' berarti 'Apakah buku ini ditulis olehmu?'. Kata 'written' adalah bentuk verb-3 (past participle) dari 'write'. Setelah 'is' dalam passive voice, kita harus menggunakan verb-3.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Write' adalah verb-1 (bentuk dasar). ❌ 'Writes' adalah verb-1 dengan tambahan -s untuk subjek tunggal aktif. ✅ 'Written' adalah verb-3 yang tepat untuk passive voice. ❌ 'Writing' adalah verb-ing yang digunakan untuk continuous tense.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Written</strong> (Is this book written by you?)"
        },
        { 
            q: "Your father often ________ to the office at 6 Am.", 
            o: ["Go", "Goes", "Went", "Going"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'often' (sering) adalah adverb of frequency yang menandakan kebiasaan atau rutinitas. Oleh karena itu, kalimat ini menggunakan Simple Present Tense.<br><br>📌 <strong>Rumus Simple Present (Positive):</strong> Subject + Verb-1 (+ s/es untuk subjek tunggal)<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek 'Your father' adalah orang ketiga tunggal (he). Dalam Simple Present Tense untuk subjek tunggal, kata kerja harus ditambahkan -s atau -es. Kata 'go' mendapat akhiran -es menjadi 'goes'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Go' digunakan untuk subjek I, you, we, they. ✅ 'Goes' adalah jawaban yang benar untuk subjek tunggal. ❌ 'Went' adalah bentuk past tense (Simple Past). ❌ 'Going' adalah bentuk verb-ing yang membutuhkan auxiliary 'is/am/are'.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Goes</strong> (Your father often goes to the office at 6 Am.)"
        },
        { 
            q: "___________________ so sad last night ?", 
            o: ["Why are you", "Why you were", "Why were you", "Why you are"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'last night' (tadi malam) adalah keterangan waktu lampau, sehingga kalimat ini menggunakan Simple Past Tense. Kalimat tanya dengan 'why' membutuhkan inversi (pembalikan) antara subjek dan verb.<br><br>📌 <strong>Rumus Simple Past (Interrogative):</strong> Question word + was/were + subject + complement?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek 'you' dalam past tense menggunakan 'were'. Struktur yang benar adalah 'Why were you so sad last night?' yang berarti 'Mengapa kamu begitu sedih tadi malam?'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Why are you' menggunakan 'are' untuk present tense. ❌ 'Why you were' tidak melakukan inversi (pembalikan), sehingga salah secara struktur. ✅ 'Why were you' adalah struktur yang benar dengan inversi. ❌ 'Why you are' juga salah karena tidak ada inversi dan menggunakan present tense.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Why were you</strong> (Why were you so sad last night?)"
        },
        { 
            q: "Where _____ her friend studying right now ?", 
            o: ["Is", "Are", "Has", "Have"], 
            correct: 0, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'right now' (saat ini) adalah keterangan waktu yang menandakan aksi sedang berlangsung. Kalimat ini menggunakan Present Continuous Tense.<br><br>📌 <strong>Rumus Present Continuous (Interrogative):</strong> Question word + is/am/are + subject + verb-ing?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek 'her friend' (temannya) adalah orang ketiga tunggal. Dalam Present Continuous Tense, subjek tunggal menggunakan auxiliary 'is'. Struktur yang benar: 'Where is her friend studying right now?' yang berarti 'Di mana temannya sedang belajar saat ini?'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ✅ 'Is' adalah jawaban yang benar untuk subjek tunggal. ❌ 'Are' digunakan untuk subjek jamak (you, we, they). ❌ 'Has' digunakan untuk Present Perfect. ❌ 'Have' juga untuk Present Perfect dengan subjek jamak atau I/you.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Is</strong> (Where is her friend studying right now?)"
        },
        { 
            q: "Where has that thief _________ money ?", 
            o: ["Steal", "Stole", "Stealed", "Stolen"], 
            correct: 3, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'has' dalam kalimat ini adalah auxiliary untuk Present Perfect Tense. Dalam Present Perfect, setelah 'has' atau 'have' harus diikuti oleh verb-3 (past participle).<br><br>📌 <strong>Rumus Present Perfect (Interrogative):</strong> Question word + has/have + subject + verb-3?<br><br>📌 <strong>Alasan Jawaban:</strong> 'Stolen' adalah bentuk verb-3 (past participle) dari 'steal'. Bentuk verb-1 = steal, verb-2 = stole, verb-3 = stolen. Jadi kalimat yang benar adalah 'Where has that thief stolen money?' yang berarti 'Di mana pencuri itu telah mencuri uang?'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Steal' adalah verb-1 (bentuk dasar). ❌ 'Stole' adalah verb-2 (past tense). ❌ 'Stealed' bukan bentuk yang benar (steal adalah irregular verb). ✅ 'Stolen' adalah verb-3 yang tepat untuk Present Perfect.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Stolen</strong> (Where has that thief stolen money?)"
        },
        { 
            q: "Where _______ Mr Rizky and Mr Imdar teaching English ?", 
            o: ["Is", "Are", "Do", "Does"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'teaching' adalah bentuk verb-ing yang menandakan kalimat ini menggunakan Present Continuous Tense. Kita perlu menentukan auxiliary yang tepat (is/am/are) berdasarkan subjek.<br><br>📌 <strong>Rumus Present Continuous (Interrogative):</strong> Question word + is/am/are + subject + verb-ing?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek dalam kalimat ini adalah 'Mr Rizky and Mr Imdar' yang merupakan dua orang (jamak/plural). Untuk subjek jamak dalam Present Continuous, kita menggunakan auxiliary 'are'. Struktur yang benar: 'Where are Mr Rizky and Mr Imdar teaching English?' yang berarti 'Di mana Pak Rizky dan Pak Imdar sedang mengajar Bahasa Inggris?'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Is' digunakan untuk subjek tunggal (he/she/it). ✅ 'Are' adalah jawaban yang benar untuk subjek jamak. ❌ 'Do' digunakan untuk Simple Present. ❌ 'Does' juga untuk Simple Present dengan subjek tunggal.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Are</strong> (Where are Mr Rizky and Mr Imdar teaching English?)"
        },
        { 
            q: "Where have those employees been _____ for two hours ?", 
            o: ["Swim", "Swam", "Swum", "Swimming"], 
            correct: 3, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Struktur 'have been _____' menunjukkan Present Perfect Continuous Tense. Kata 'for two hours' (selama dua jam) menunjukkan durasi waktu, yang merupakan ciri khas Present Perfect Continuous.<br><br>📌 <strong>Rumus Present Perfect Continuous:</strong> Subject + have/has + been + verb-ing<br><br>📌 <strong>Alasan Jawaban:</strong> Setelah 'have been', kita harus menggunakan verb-ing (present participle). 'Swimming' adalah bentuk verb-ing dari 'swim'. Kalimat 'Where have those employees been swimming for two hours?' berarti 'Di mana para karyawan itu telah berenang selama dua jam?'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Swim' adalah verb-1 (bentuk dasar). ❌ 'Swam' adalah verb-2 (past tense). ❌ 'Swum' adalah verb-3 (past participle) yang digunakan untuk Present Perfect biasa, bukan Present Perfect Continuous. ✅ 'Swimming' adalah verb-ing yang tepat untuk Present Perfect Continuous.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Swimming</strong> (Where have those employees been swimming for two hours?)"
        },
        { 
            q: "Where _______ Riri always go on saturday ?", 
            o: ["Do", "Does", "Has", "Am"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'always' (selalu) dan 'on saturday' (setiap hari Sabtu) menandakan kebiasaan atau rutinitas. Kalimat ini menggunakan Simple Present Tense. Kata 'go' adalah verb-1, sehingga kita membutuhkan auxiliary untuk membentuk kalimat tanya.<br><br>📌 <strong>Rumus Simple Present (Interrogative):</strong> Question word + do/does + subject + verb-1?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek 'Riri' adalah orang ketiga tunggal (she). Oleh karena itu, auxiliary yang digunakan adalah 'does'. Struktur yang benar: 'Where does Riri always go on Saturday?' yang berarti 'Ke mana Riri selalu pergi pada hari Sabtu?'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Do' digunakan untuk subjek I, you, we, they. ✅ 'Does' adalah jawaban yang benar untuk subjek tunggal Riri. ❌ 'Has' digunakan untuk Present Perfect. ❌ 'Am' digunakan untuk subjek 'I' dalam Present Continuous.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Does</strong> (Where does Riri always go on Saturday?)"
        },
        { 
            q: "Where ________ your cousin __________ English so fast by practicing it ?", 
            o: ["Have, learned", "Has, learned", "Have, been learning", "Has, been learning"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kalimat ini menanyakan tentang proses belajar bahasa Inggris yang dilakukan dengan cara mempraktikkannya. Struktur yang tepat adalah Present Perfect Tense karena fokus pada hasil atau pencapaian yang telah terjadi.<br><br>📌 <strong>Rumus Present Perfect:</strong> Question word + has/have + subject + verb-3?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek 'your cousin' (sepupumu) adalah orang ketiga tunggal, sehingga menggunakan 'has'. Kata 'learned' adalah verb-3 (past participle) dari 'learn'. Jadi jawaban yang benar adalah 'has, learned'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Have, learned' menggunakan 'have' yang seharusnya untuk subjek jamak. ✅ 'Has, learned' adalah jawaban yang benar untuk subjek tunggal. ❌ 'Have, been learning' adalah Present Perfect Continuous yang lebih menekankan durasi. ❌ 'Has, been learning' juga Present Perfect Continuous, sementara soal lebih tepat menggunakan Present Perfect biasa.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Has, learned</strong> (Where has your cousin learned English so fast by practicing it?)"
        },
        { 
            q: "Where are you ________ ?", 
            o: ["Go", "Gone", "Going", "Goes"], 
            correct: 2, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Struktur 'are you ________' dengan auxiliary 'are' menunjukkan kalimat ini menggunakan Present Continuous Tense. Present Continuous digunakan untuk menanyakan aksi yang sedang berlangsung saat ini.<br><br>📌 <strong>Rumus Present Continuous:</strong> Question word + is/am/are + subject + verb-ing?<br><br>📌 <strong>Alasan Jawaban:</strong> Setelah 'are you', kita harus menggunakan verb-ing (present participle). 'Going' adalah bentuk verb-ing dari 'go'. Kalimat 'Where are you going?' berarti 'Kamu sedang pergi ke mana?'. Ini adalah ungkapan yang sangat umum dalam percakapan sehari-hari.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Go' adalah verb-1 (bentuk dasar) untuk Simple Present. ❌ 'Gone' adalah verb-3 (past participle) untuk Present Perfect. ✅ 'Going' adalah verb-ing yang tepat untuk Present Continuous. ❌ 'Goes' adalah bentuk verb-1 dengan -s untuk subjek tunggal.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Going</strong> (Where are you going?)"
        },
        { 
            q: "______________ your friends usually hang out ?", 
            o: ["Where do", "Where does", "Where are", "Where Did"], 
            correct: 0, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'usually' (biasanya) menandakan kebiasaan atau rutinitas. Kalimat ini menggunakan Simple Present Tense. Kata 'hang out' adalah verb-1, sehingga kita membutuhkan auxiliary 'do' atau 'does' untuk membentuk kalimat tanya.<br><br>📌 <strong>Rumus Simple Present (Interrogative):</strong> Question word + do/does + subject + verb-1?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek 'your friends' (teman-temanmu) adalah jamak (plural), sehingga menggunakan auxiliary 'do'. Struktur yang benar adalah 'Where do your friends usually hang out?' yang berarti 'Di mana teman-temanmu biasanya nongkrong?'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ✅ 'Where do' adalah jawaban yang benar untuk subjek jamak. ❌ 'Where does' digunakan untuk subjek tunggal. ❌ 'Where are' digunakan untuk Present Continuous atau kata sifat. ❌ 'Where Did' digunakan untuk Simple Past (past tense).<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Where do</strong> (Where do your friends usually hang out?)"
        },
        { 
            q: "Where ____________ brother eaten Pizza ?", 
            o: ["Has, Yours", "Has, Your", "Have, Yours", "Have, Your"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'eaten' adalah bentuk verb-3 (past participle) yang menandakan Present Perfect Tense. Kita perlu menentukan auxiliary yang tepat (has/have) dan possessive adjective yang tepat (your/yours).<br><br>📌 <strong>Rumus Present Perfect (Interrogative):</strong> Question word + has/have + subject + verb-3?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek 'brother' (saudara laki-laki) adalah orang ketiga tunggal, sehingga menggunakan 'has'. Untuk menyatakan kepemilikan, kita menggunakan 'your' (kata sifat kepemilikan) sebelum kata benda 'brother'. 'Yours' adalah kata ganti kepemilikan (possessive pronoun) yang tidak bisa diikuti kata benda.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Has, Yours' salah karena 'yours' tidak bisa diikuti kata benda. ✅ 'Has, Your' adalah jawaban yang benar. ❌ 'Have, Yours' menggunakan 'have' yang salah untuk subjek tunggal. ❌ 'Have, Your' juga salah karena 'have' untuk subjek jamak.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Has, Your</strong> (Where has your brother eaten Pizza?)"
        },
        { 
            q: "______________ always given money by your father ?", 
            o: ["Are you", "Do you", "Have you", "Did you"], 
            correct: 0, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'given' adalah bentuk verb-3 (past participle) dan ada kata 'by' yang menunjukkan pelaku. Ini adalah kalimat passive voice. Struktur passive voice untuk Present Continuous atau Simple Present? Mari kita analisis.<br><br>📌 <strong>Rumus Passive Voice (Simple Present):</strong> Is/Am/Are + subject + verb-3 + by + agent<br><br>📌 <strong>Alasan Jawaban:</strong> Kalimat ini menggunakan passive voice dengan struktur 'are you given' yang berarti 'apakah kamu diberi'. 'Always' menunjukkan kebiasaan, sehingga menggunakan Simple Present. Subjek 'you' menggunakan 'are'. Kalimat lengkap: 'Are you always given money by your father?' yang berarti 'Apakah kamu selalu diberi uang oleh ayahmu?'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ✅ 'Are you' adalah jawaban yang benar untuk passive voice dengan subjek 'you'. ❌ 'Do you' digunakan untuk active voice Simple Present. ❌ 'Have you' digunakan untuk Present Perfect. ❌ 'Did you' digunakan untuk Simple Past.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Are you</strong> (Are you always given money by your father?)"
        },
        { 
            q: "What ________ you usually do before sleeping ?", 
            o: ["Do", "Are", "Did", "Were"], 
            correct: 0, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'usually' (biasanya) menandakan kebiasaan atau rutinitas. Kalimat ini menggunakan Simple Present Tense. Kata 'do' adalah verb-1, sehingga kita membutuhkan auxiliary untuk membentuk kalimat tanya.<br><br>📌 <strong>Rumus Simple Present (Interrogative):</strong> Question word + do/does + subject + verb-1?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek 'you' menggunakan auxiliary 'do'. Struktur yang benar adalah 'What do you usually do before sleeping?' yang berarti 'Apa yang biasanya kamu lakukan sebelum tidur?'.<br><br>📌 <strong>Perbandingan Opsi:</strong> ✅ 'Do' adalah jawaban yang benar untuk subjek 'you'. ❌ 'Are' digunakan untuk Present Continuous atau kata sifat. ❌ 'Did' digunakan untuk Simple Past. ❌ 'Were' digunakan untuk past tense dengan kata sifat atau passive voice.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Do</strong> (What do you usually do before sleeping?)"
        },
        { 
            q: "_____________ always feel sad with him ?", 
            o: ["Aren't you", "Don't you", "Haven't you", "Didn't you"], 
            correct: 1, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'always' (selalu) menandakan kebiasaan atau rutinitas. Kalimat ini menggunakan Simple Present Tense. Kata 'feel' adalah verb-1 (bentuk dasar). Pertanyaan ini adalah bentuk negative question (pertanyaan negatif).<br><br>📌 <strong>Rumus Negative Question (Simple Present):</strong> Don't/Doesn't + subject + verb-1?<br><br>📌 <strong>Alasan Jawaban:</strong> Subjek 'you' menggunakan auxiliary 'do' dalam bentuk negatif menjadi 'don't'. Struktur yang benar adalah 'Don't you always feel sad with him?' yang berarti 'Tidakkah kamu selalu merasa sedih bersamanya?'. Pertanyaan negatif sering digunakan untuk meminta konfirmasi atau menunjukkan ekspektasi.<br><br>📌 <strong>Perbandingan Opsi:</strong> ❌ 'Aren't you' digunakan untuk kata sifat (adjective) atau Present Continuous. ✅ 'Don't you' adalah jawaban yang benar untuk verb 'feel' dalam Simple Present. ❌ 'Haven't you' digunakan untuk Present Perfect. ❌ 'Didn't you' digunakan untuk Simple Past.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Don't you</strong> (Don't you always feel sad with him?)"
        },
        { 
            q: "_____________ always accompanies you ?", 
            o: ["Who", "Who does", "Who did", "Who was"], 
            correct: 0, 
            explanation: "💡 <strong>PEMBAHASAN LENGKAP:</strong><br><br>📌 <strong>Analisis Soal:</strong> Kata 'always' (selalu) menandakan kebiasaan. Kalimat ini menggunakan Simple Present Tense. Kata 'accompanies' adalah verb-1 dengan tambahan -s/-es. Ini adalah kalimat yang menanyakan subjek (pelaku) dari aksi.<br><br>📌 <strong>Aturan Subject Question:</strong> Ketika menanyakan subjek (siapa yang melakukan aksi), kita tidak menggunakan auxiliary do/does. Cukup gunakan question word 'who' diikuti verb yang sesuai dengan subjek yang ditanyakan.<br><br>📌 <strong>Alasan Jawaban:</strong> Pertanyaan 'Who always accompanies you?' berarti 'Siapa yang selalu menemanimu?'. Di sini 'who' berfungsi sebagai subjek, sehingga kata kerja langsung mengikutinya dalam bentuk verb-1+s/es (accompanies) karena 'who' dianggap sebagai subjek tunggal.<br><br>📌 <strong>Perbandingan Opsi:</strong> ✅ 'Who' adalah jawaban yang benar karena ini adalah subject question. ❌ 'Who does' akan digunakan jika 'who' bukan subjek, misalnya 'Who does she accompany?' (siapa yang dia temani?). ❌ 'Who did' digunakan untuk past tense. ❌ 'Who was' digunakan untuk past tense dengan kata sifat atau passive voice.<br><br>📌 <strong>Kesimpulan:</strong> <strong>Jawaban: Who</strong> (Who always accompanies you?)"
        }
    ];

    // state aplikasi
    let currentIndex = 0;
    let userAnswers = new Array(questionsData.length).fill(null);
    let answerStatus = new Array(questionsData.length).fill(false);
    let answeredQuestions = new Array(questionsData.length).fill(false);
    let score = 0;
    
    const totalQ = questionsData.length;
    document.getElementById("totalQuestions").innerText = totalQ;
    document.getElementById("totalDisplay").innerText = totalQ;
    
    // Elemen DOM
    const questionTextEl = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const feedbackArea = document.getElementById("feedbackArea");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const scoreSpan = document.getElementById("scoreValue");
    const currentIdxDisplaySpan = document.getElementById("currentIdxDisplay");
    const resultAreaDiv = document.getElementById("resultArea");
    const quizCardDiv = document.getElementById("quizCard");
    
    // fungsi hitung ulang score
    function recalcScore() {
        let newScore = 0;
        for (let i = 0; i < totalQ; i++) {
            if (answerStatus[i] === true) newScore++;
        }
        score = newScore;
        scoreSpan.innerText = score;
    }
    
    // update tombol navigasi
    function updateNavButtons() {
        prevBtn.disabled = (currentIndex === 0);
        
        if (currentIndex === totalQ - 1) {
            nextBtn.innerHTML = '<i class="fas fa-check-circle"></i> Lihat Hasil';
        } else {
            nextBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Selanjutnya';
        }
        
        if (!answeredQuestions[currentIndex]) {
            nextBtn.disabled = true;
        } else {
            nextBtn.disabled = false;
        }
    }
    
    // render feedback
    function renderFeedbackForCurrent() {
        const idx = currentIndex;
        const selected = userAnswers[idx];
        const isAnswered = answeredQuestions[idx];
        const isCorrect = answerStatus[idx];
        const question = questionsData[idx];
        
        if (!isAnswered || selected === null) {
            feedbackArea.className = "feedback-area feedback-neutral";
            feedbackArea.innerHTML = `<div class="feedback-text"><i class="fas fa-lightbulb"></i> Pilih salah satu jawaban untuk melihat pembahasan & kunci.</div>`;
            return;
        }
        
        const selectedText = question.o[selected];
        const correctText = question.o[question.correct];
        const explanation = question.explanation;
        
        if (isCorrect) {
            feedbackArea.className = "feedback-area feedback-correct";
            feedbackArea.innerHTML = `
                <div class="feedback-text">
                    <i class="fas fa-check-circle" style="color:#2b9348; font-size:1.2rem;"></i>
                    <strong>✅ Jawaban Benar!</strong> &nbsp; Pilihanmu: "${selectedText}" 
                </div>
                <div style="margin-top: 12px; font-size:0.95rem; line-height:1.6;">${explanation}</div>
            `;
        } else {
            feedbackArea.className = "feedback-area feedback-wrong";
            feedbackArea.innerHTML = `
                <div class="feedback-text">
                    <i class="fas fa-times-circle" style="color:#e63946; font-size:1.2rem;"></i>
                    <strong>❌ Jawaban Salah</strong> &nbsp; Kamu menjawab: "${selectedText}"
                </div>
                <div style="margin-top: 12px; font-size:0.95rem; line-height:1.6;">${explanation}<br><br>📌 <strong>Jawaban yang benar adalah:</strong> "${correctText}"</div>
            `;
        }
    }
    
    // render soal
    function renderCurrentQuestion() {
        const qData = questionsData[currentIndex];
        questionTextEl.innerText = qData.q;
        const selectedIdx = userAnswers[currentIndex];
        const isAnsweredLocal = answeredQuestions[currentIndex];
        
        let optionsHtml = '';
        const letters = ['A', 'B', 'C', 'D'];
        qData.o.forEach((opt, idx) => {
            let additionalClass = '';
            let checkedStyle = '';
            if (isAnsweredLocal && selectedIdx === idx) {
                additionalClass = 'style="background: #E9DFFF; border-color: #9B6BFF; box-shadow: 0 2px 8px rgba(155,107,255,0.2);"';
                checkedStyle = 'font-weight: bold;';
            }
            optionsHtml += `
                <div class="option-btn" data-opt-index="${idx}" ${additionalClass}>
                    <span class="prefix">${letters[idx]}</span>
                    <span style="flex:1; ${checkedStyle}">${opt}</span>
                </div>
            `;
        });
        optionsContainer.innerHTML = optionsHtml;
        
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const optIndex = parseInt(btn.dataset.optIndex);
                handleAnswer(optIndex);
            });
        });
        
        renderFeedbackForCurrent();
        updateNavButtons();
        document.getElementById("currentIdxDisplay").innerText = currentIndex + 1;
    }
    
    // handle jawaban
    function handleAnswer(selectedIndex) {
        const currentQ = questionsData[currentIndex];
        const isCorrectNow = (selectedIndex === currentQ.correct);
        const wasAlreadyAnswered = answeredQuestions[currentIndex];
        
        userAnswers[currentIndex] = selectedIndex;
        answeredQuestions[currentIndex] = true;
        const oldStatus = answerStatus[currentIndex];
        answerStatus[currentIndex] = isCorrectNow;
        
        if (oldStatus !== isCorrectNow) {
            recalcScore();
        } else if (!wasAlreadyAnswered && isCorrectNow) {
            recalcScore();
        } else if (!wasAlreadyAnswered && !isCorrectNow) {
            recalcScore();
        } else if (wasAlreadyAnswered && oldStatus !== isCorrectNow) {
            recalcScore();
        } else {
            recalcScore();
        }
        
        renderCurrentQuestion();
        updateNavButtons();
    }
    
    // navigasi
    function goNext() {
        if (currentIndex < totalQ - 1) {
            currentIndex++;
            renderCurrentQuestion();
            updateNavButtons();
        } else {
            if (answeredQuestions.every(v => v === true)) {
                showFinalResult();
            } else {
                alert(`⚠️ Anda belum menjawab semua soal! Selesaikan dulu ${totalQ - answeredQuestions.filter(v=>v===true).length} soal tersisa.`);
                return;
            }
        }
    }
    
    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
            updateNavButtons();
        }
    }
    
    // analisis kelemahan
    function analyzeWeakness() {
        let categories = {
            "Present Perfect Tense": [],
            "Simple Present Tense (Do/Does)": [],
            "Present Continuous Tense": [],
            "Passive Voice": [],
            "Subject Questions (Who/What)": [],
            "Past Tense (Was/Were/Did)": [],
            "Present Perfect Continuous": []
        };
        
        for (let i = 0; i < totalQ; i++) {
            const isCorrect = answerStatus[i];
            const qText = questionsData[i].q;
            let category = "";
            
            if (qText.includes("had lunch") || qText.includes("eaten") || qText.includes("has") || qText.includes("stolen") || qText.includes("have those employees")) category = "Present Perfect Tense";
            else if (qText.includes("usually") || qText.includes("always") || qText.includes("every") || qText.includes("often") || qText.includes("do") && !qText.includes("did")) category = "Simple Present Tense (Do/Does)";
            else if (qText.includes("right now") || qText.includes("now") || qText.includes("teaching") || qText.includes("studying") || qText.includes("going")) category = "Present Continuous Tense";
            else if (qText.includes("by you") || qText.includes("by your father")) category = "Passive Voice";
            else if (qText.includes("Who always") || qText.includes("What makes")) category = "Subject Questions (Who/What)";
            else if (qText.includes("last night") || qText.includes("yesterday")) category = "Past Tense (Was/Were/Did)";
            else if (qText.includes("been swimming") || qText.includes("for two hours")) category = "Present Perfect Continuous";
            else category = "Other";
            
            if (!isCorrect) {
                categories[category] = categories[category] || [];
                categories[category].push(i+1);
            }
        }
        
        let weaknesses = [];
        for (let [cat, arr] of Object.entries(categories)) {
            if (arr.length > 0) weaknesses.push({ cat, count: arr.length, soal: arr });
        }
        return weaknesses;
    }
    
    // tampilkan hasil akhir
    function showFinalResult() {
        quizCardDiv.style.display = "none";
        document.querySelector(".score-panel").style.display = "none";
        resultAreaDiv.style.display = "block";
        
        const percentage = (score / totalQ) * 100;
        let gradeText = "";
        if (percentage >= 85) gradeText = "🏆 Excellent! Grammar pro!";
        else if (percentage >= 70) gradeText = "🎉 Good job, tingkatkan lagi!";
        else if (percentage >= 50) gradeText = "📚 Perlu belajar lebih giat, fokus pada pembahasan.";
        else gradeText = "⚠️ Masih banyak kelemahan, pelajari ulang materi dasar.";
        
        const weaknesses = analyzeWeakness();
        let weakHtml = `<div style="margin-top: 16px;"><strong><i class="fas fa-chart-line"></i> Analisis Kelemahan:</strong><br/>`;
        if (weaknesses.length === 0) {
            weakHtml += `<span class="weakness-tag"><i class="fas fa-check-circle"></i> Hebat! Tidak ada kelemahan signifikan!</span>`;
        } else {
            weakHtml += `<div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;">`;
            weaknesses.forEach(w => {
                weakHtml += `<span class="weakness-tag"><i class="fas fa-exclamation-triangle"></i> ${w.cat} (salah di ${w.soal.length} soal: nomor ${w.soal.join(", ")})</span>`;
            });
            weakHtml += `</div><p style="margin-top: 12px; font-size: 0.85rem;">✨ Fokus ulang pada materi di atas untuk meningkatkan skor!</p>`;
        }
        
        resultAreaDiv.innerHTML = `
            <div style="text-align: center;">
                <i class="fas fa-chalkboard-user" style="font-size: 3rem; color:#8B5CF6;"></i>
                <h2 style="margin: 10px 0 5px;">Hasil Evaluasi Grammar</h2>
                <div style="font-size: 2.5rem; font-weight: 800; background: linear-gradient(145deg,#7C3AED,#A78BFA); -webkit-background-clip:text; background-clip:text; color:transparent;">${score}/${totalQ}</div>
                <div style="background:#ede8ff; display:inline-block; padding:5px 18px; border-radius:40px;">${gradeText}</div>
                <div style="margin: 20px auto; max-width: 200px;">
                    <canvas id="scoreChart" width="200" height="200"></canvas>
                </div>
                ${weakHtml}
                <button id="restartQuizBtn" class="nav-btn nav-btn-primary" style="margin-top: 25px; background: #5a2d9c;"><i class="fas fa-sync-alt"></i> Ulangi Kuis</button>
            </div>
        `;
        
        const ctx = document.getElementById('scoreChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Benar', 'Salah'],
                datasets: [{
                    data: [score, totalQ - score],
                    backgroundColor: ['#9B6BFF', '#F0E6FF'],
                    borderWidth: 0,
                    cutout: '65%'
                }]
            },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
        });
        
        document.getElementById("restartQuizBtn").addEventListener("click", () => {
            userAnswers.fill(null);
            answerStatus.fill(false);
            answeredQuestions.fill(false);
            currentIndex = 0;
            score = 0;
            recalcScore();
            quizCardDiv.style.display = "block";
            document.querySelector(".score-panel").style.display = "flex";
            resultAreaDiv.style.display = "none";
            renderCurrentQuestion();
            updateNavButtons();
        });
    }
    
    // event listeners
    prevBtn.addEventListener("click", goPrev);
    nextBtn.addEventListener("click", goNext);
    
    // init
    recalcScore();
    renderCurrentQuestion();
</script>
</body>
</html>
