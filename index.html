<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Grammar Quiz - SALVO GROUP (Stable Version)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#f3e8ff,#ede9fe);
    margin: 0;
    padding: 0;
}

.quiz-container {
    max-width: 900px;
    margin: auto;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

.header {
    background: linear-gradient(135deg,#7c3aed,#a855f7);
    color: white;
    padding: 20px;
    text-align: center;
}

.score-panel {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #faf5ff;
    font-weight: bold;
    flex-wrap: wrap;
}

.progress-bar {
    width: 100%;
    height: 10px;
    background: #ddd;
}

#progressFill {
    height: 10px;
    width: 0%;
    background: linear-gradient(90deg,#7c3aed,#a855f7);
    transition: width 0.3s ease;
}

.timer {
    font-size: 18px;
    color: #7c3aed;
}

.question {
    padding: 25px;
    font-size: 20px;
    font-weight: bold;
}

.option {
    margin: 10px 25px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    cursor: pointer;
    transition: 0.2s;
}

.option:hover {
    background: #f3e8ff;
}

.correct {
    background: #d1fae5;
    border-color: green;
}

.wrong {
    background: #fee2e2;
    border-color: red;
    animation: shake 0.4s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

.navigation {
    display: flex;
    justify-content: space-between;
    padding: 20px;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg,#7c3aed,#a855f7);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.number-nav {
    padding: 10px;
    text-align: center;
}

.number-nav button {
    margin: 4px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
}

.number-nav .answered {
    background: #22c55e;
}

.number-nav .active {
    background: #111827;
}

.result {
    text-align: center;
    padding: 30px;
    display: none;
}

.grade {
    font-size: 28px;
    font-weight: bold;
    color: #7c3aed;
}

.explanation {
    background: #fef9c3;
    padding: 15px;
    margin: 15px 25px;
    border-left: 5px solid orange;
    border-radius: 10px;
}

.restart-btn {
    margin-top: 20px;
}

</style>
</head>

<body>

<div class="quiz-container">

<div class="header">
<h1><i class="fas fa-graduation-cap"></i> ADVANCED GRAMMAR QUIZ</h1>
<p>SALVO GROUP Interactive Quiz System - Stable Build</p>
</div>

<div class="score-panel">
<div>Score: <span id="score">0</span></div>
<div class="timer">Time: <span id="timer">10:00</span></div>
</div>

<div class="progress-bar">
<div id="progressFill"></div>
</div>

<div id="quizArea"></div>

<div class="number-nav" id="numberNav"></div>

<div class="navigation">
<button id="prevBtn">Previous</button>
<button id="nextBtn">Next</button>
<button id="submitBtn">Submit</button>
</div>

<div class="result" id="resultBox">
<h2>Quiz Complete</h2>
<div id="finalScore"></div>
<div class="grade" id="grade"></div>
<button class="restart-btn" onclick="restartQuiz()">Restart Quiz</button>
</div>

</div>

<script>

const questions = [

{
text: "_____ you had lunch?",
options: ["Have","Has","Did","Do"],
correct: 0,
explanation: "Pertanyaan Present Perfect menggunakan HAVE + Verb 3. Subject YOU → gunakan HAVE. Struktur: Have you had lunch?"
},

{
text: "What ___ we have to do?",
options: ["do","does","did","are"],
correct: 0,
explanation: "Kalimat pertanyaan Simple Present dengan subject WE menggunakan auxiliary DO."
},

{
text: "What ______ you happy in the morning?",
options: ["makes","make","made","making"],
correct: 0,
explanation: "WHAT sebagai subject singular → gunakan MAKES (Simple Present singular verb)."
},

{
text: "How many books ______ Erny buy?",
options: ["did","does","do","is"],
correct: 0,
explanation: "Pertanyaan jumlah pada masa lampau biasanya menggunakan DID + subject + verb 1."
},

{
text: "Is this book __________ by you?",
options: ["written","write","wrote","writing"],
correct: 0,
explanation: "Kalimat Passive Voice: Is + subject + Verb 3. WRITE → WRITTEN."
},

{
text: "Your father often ______ to the office at 6 AM.",
options: ["go","goes","went","going"],
correct: 1,
explanation: "Often menunjukkan kebiasaan (Simple Present). Subject singular → GOES."
},

{
text: "________ so sad last night?",
options: ["Why were you","Why are you","Why did you","Why do you"],
correct: 0,
explanation: "Last night = past time marker. Subject YOU → gunakan WERE dalam Simple Past question."
},

{
text: "Where _____ her friend studying right now?",
options: ["is","are","was","were"],
correct: 0,
explanation: "Right now menunjukkan Present Continuous → IS studying karena subject singular."
},

{
text: "Where has that thief ______ money?",
options: ["hidden","hide","hides","hiding"],
correct: 0,
explanation: "Present Perfect: HAS + Verb 3. HIDE → HIDDEN."
},

{
text: "Where ______ Mr Rizky and Mr Imdar teaching English?",
options: ["are","is","was","does"],
correct: 0,
explanation: "Subject plural (Mr Rizky and Mr Imdar) + Present Continuous → ARE teaching."
},

{
text: "Where have those employees been _____ for two hours?",
options: ["working","work","worked","works"],
correct: 0,
explanation: "Present Perfect Continuous: have been + Verb-ing. Maka jawabannya WORKING."
},

{
text: "Where ______ Riri always go on Saturday?",
options: ["does","do","did","is"],
correct: 0,
explanation: "Always menunjukkan kebiasaan. Subject singular (Riri) → gunakan DOES."
},

{
text: "Where ______ your cousin __________ English so fast by practicing it?",
options: ["does – learn","do – learn","did – learned","is – learning"],
correct: 0,
explanation: "Kalimat kebiasaan / kemampuan saat ini menggunakan Simple Present. Subject singular → DOES + learn."
},

{
text: "Where are you ______?",
options: ["going","go","went","goes"],
correct: 0,
explanation: "Present Continuous: are + Verb-ing → GOING."
},

{
text: "______________ your friends usually hang out?",
options: ["Where do","Where does","Where did","Where are"],
correct: 0,
explanation: "Usually menunjukkan kebiasaan. Subject plural → gunakan DO."
},

{
text: "Where __________ brother eaten pizza?",
options: ["has your","have your","did your","does your"],
correct: 0,
explanation: "Present Perfect: HAS + eaten karena subject singular (brother)."
},

{
text: "______________ always given money by your father?",
options: ["Are you","Do you","Did you","Have you"],
correct: 0,
explanation: "Passive voice Present Simple: Are you given money by your father?"
},

{
text: "What ______ you usually do before sleeping?",
options: ["do","does","did","are"],
correct: 0,
explanation: "Usually menunjukkan kebiasaan → gunakan DO untuk subject YOU."
},

{
text: "_____________ always feel sad with him?",
options: ["Do you","Does you","Are you","Did you"],
correct: 0,
explanation: "Simple Present question dengan subject YOU menggunakan DO."
},

{
text: "_____________ always accompanies you?",
options: ["Who","Whom","Which","Where"],
correct: 0,
explanation: "WHO digunakan sebagai subject (pelaku yang menemani)."
}

];

let current = 0;
let answers = new Array(questions.length).fill(null);
let quizSubmitted = false;

function renderQuestion() {

const q = questions[current];

let html = `<div class="question">${q.text}</div>`;

q.options.forEach((opt,i)=>{

let className = "option";

if(answers[current]!==null){

if(i===q.correct) className += " correct";

if(i===answers[current] && i!==q.correct)
className += " wrong";

}

html += `
<div class="${className}" onclick="selectAnswer(${i})">
${String.fromCharCode(65+i)}. ${opt}
</div>`;

});

if(answers[current]!==null){

html += `
<div class="explanation">
${q.explanation}
</div>`;

}

document.getElementById("quizArea").innerHTML = html;

updateProgress();
updateNumberNav();
updateNavButtons();

}

function selectAnswer(i){

if(answers[current]!==null || quizSubmitted) return;

answers[current] = i;

if(i===questions[current].correct){

burstConfetti();
playSound();

}

updateScore();
renderQuestion();

}

function updateScore(){

let score = 0;

answers.forEach((a,i)=>{

if(a===questions[i].correct)
score++;

});


document.getElementById("score").innerText = score;

}

function updateProgress(){

let answered = answers.filter(a=>a!==null).length;

let percent = (answered/questions.length)*100;


document.getElementById("progressFill").style.width = percent+"%";

}

function updateNumberNav(){

let nav="";

for(let i=0;i<questions.length;i++){

let cls="";

if(answers[i]!==null)
cls += "answered ";

if(i===current)
cls += "active";

nav += `<button class="${cls}" onclick="goTo(${i})">${i+1}</button>`;

}


document.getElementById("numberNav").innerHTML = nav;

}

function updateNavButtons(){


document.getElementById("prevBtn").disabled = current===0;


document.getElementById("nextBtn").disabled = current===questions.length-1;

}

function goTo(i){

current=i;
renderQuestion();

}


document.getElementById("nextBtn").onclick=()=>{

if(current<questions.length-1){
current++;
renderQuestion();
}

};


document.getElementById("prevBtn").onclick=()=>{

if(current>0){
current--;
renderQuestion();
}

};

function burstConfetti(){

if (typeof confetti === "function") {

confetti({
particleCount:150,
spread:80,
origin:{y:0.6}
});

}

}

function playSound(){

try{
const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
audio.play();
}catch(e){
console.log("Sound blocked");
}

}

let timeLeft = 600;

const timerInterval = setInterval(()=>{

if(quizSubmitted) return;

let minutes = Math.floor(timeLeft/60);
let seconds = timeLeft%60;


document.getElementById("timer").innerText =
`${minutes}:${seconds.toString().padStart(2,'0')}`;

if(timeLeft<=0){
submitQuiz();
}

if(timeLeft>0){
timeLeft--;
}

},1000);

function submitQuiz(){

if(quizSubmitted) return;

quizSubmitted = true;

clearInterval(timerInterval);

let score = answers.filter((a,i)=>a===questions[i].correct).length;

let percent = Math.round((score/questions.length)*100);

let grade="";

if(percent>=90) grade="A";
else if(percent>=80) grade="B";
else if(percent>=70) grade="C";
else if(percent>=60) grade="D";
else grade="E";


document.getElementById("resultBox").style.display="block";


document.getElementById("finalScore").innerText =
`Score: ${score}/${questions.length} (${percent}%)`;


document.getElementById("grade").innerText =
`Grade: ${grade}`;

burstConfetti();

}


document.getElementById("submitBtn").onclick=submitQuiz;

function restartQuiz(){

location.reload();

}

renderQuestion();

</script>

</body>
</html>
